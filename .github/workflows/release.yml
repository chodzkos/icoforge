name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.1.1)"
        required: true

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[heic,exe,svg-resvg]"
          pip install pyinstaller

      - name: Set up MSYS2
        uses: msys2/setup-msys2@66cd2cce69caa17b53920067426061ca1de3a884 # v2
        with:
          msystem: MINGW64
          update: false

      - name: Collect Cairo DLLs
        shell: msys2 {0}
        run: |
          pacman -S --noconfirm --needed mingw-w64-x86_64-cairo
          python scripts/collect_cairo_dlls.py --msys2-bin "$(cygpath -w /mingw64/bin)"

      - name: Install cairosvg (now that DLLs are present)
        run: pip install cairosvg

      - name: Install Inno Setup 6
        run: choco install innosetup --no-progress -y

      - name: Extract version from tag
        id: version
        shell: bash
        env:
          RAW_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          echo "version=${RAW_TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Build onedir + portable ZIP
        run: python scripts/build_windows.py --no-installer

      - name: Build installer EXE
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
        run: iscc "/DAppVersion=$env:APP_VERSION" installer\icoforge.iss

      - name: Upload portable ZIP artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: portable-zip
          path: dist/IcoForge-portable-*.zip

      - name: Upload installer EXE artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: installer-exe
          path: dist/IcoForge-*-setup.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          generate_release_notes: true
          files: |
            dist/IcoForge-portable-*.zip
            dist/IcoForge-*-setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
