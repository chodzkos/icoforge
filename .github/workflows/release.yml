name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"
          pip install pyinstaller

      - name: Build onedir + portable
        run: python scripts/build_windows.py

      - name: Build installer (Inno Setup)
        run: |
          iscc /DAppVersion=${{ github.ref_name }} installer/icoforge.iss
        continue-on-error: true  # installer step optional until .iss is added

      - name: Upload portable ZIP
        uses: actions/upload-artifact@v4
        with:
          name: portable-zip
          path: dist/IcoForge-portable-*.zip

      - name: Upload installer EXE
        uses: actions/upload-artifact@v4
        with:
          name: installer-exe
          path: dist/IcoForge-*-setup.exe
        continue-on-error: true  # not yet present

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/IcoForge-portable-*.zip
            dist/IcoForge-*-setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
