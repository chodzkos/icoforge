name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[heic,exe,svg-resvg]"
          pip install pyinstaller

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false

      - name: Collect Cairo DLLs
        shell: msys2 {0}
        run: |
          pacman -S --noconfirm --needed mingw-w64-x86_64-cairo
          python scripts/collect_cairo_dlls.py --msys2-bin "$(cygpath -w /mingw64/bin)"

      - name: Install cairosvg (now that DLLs are present)
        run: pip install cairosvg

      - name: Install Inno Setup 6
        run: choco install innosetup --no-progress -y

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build onedir + portable ZIP
        run: python scripts/build_windows.py --no-installer

      - name: Build installer EXE
        run: iscc /DAppVersion=${{ steps.version.outputs.version }} installer\icoforge.iss

      - name: Upload portable ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: portable-zip
          path: dist/IcoForge-portable-*.zip

      - name: Upload installer EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-exe
          path: dist/IcoForge-*-setup.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/IcoForge-portable-*.zip
            dist/IcoForge-*-setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
